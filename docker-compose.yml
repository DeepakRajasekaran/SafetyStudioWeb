version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: safetystudio-backend
    expose:
      - "5000"
    restart: unless-stopped
    environment:
      - FLASK_ENV=production

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: safetystudio-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
